# AIM — Netlify config
# This file makes the "Deploy to Netlify" button work end-to-end.

[build]
  publish = "public"
  functions = "netlify/functions"
  command = "npm run build"

[functions]
  node_bundler = "esbuild"
  # Functions live under netlify/functions/*.ts
  # _lib/ is a sibling dir of shared modules (esbuild will inline imports)

# Pretty URLs: /api/<name> → /.netlify/functions/<name>
[[redirects]]
  from = "/api/admin/tokens/*"
  to = "/.netlify/functions/admin"
  status = 200

[[redirects]]
  from = "/api/admin/*"
  to = "/.netlify/functions/admin"
  status = 200

[[redirects]]
  from = "/api/messages/*"
  to = "/.netlify/functions/messages"
  status = 200

[[redirects]]
  from = "/api/pins/*"
  to = "/.netlify/functions/pins"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA-ish fallback: unknown routes → index.html (the sign-on screen)
[[redirects]]
  from = "/chat"
  to = "/chat.html"
  status = 200

# AIM instances are private chats — keep search engines and AI scrapers out.
# This applies to every response Netlify serves (HTML, images, API).
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet, noimageindex"
    Referrer-Policy = "no-referrer"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "interest-cohort=()"

# The Deploy-to-Netlify button reads this section and prompts the user
# for each env var before provisioning the site.
[template.environment]
  GITHUB_PAT = "Fine-grained GitHub PAT scoped to your private chat repo. Permissions: Contents (read/write), Metadata (read)."
  GITHUB_REPO = "owner/name of the private GitHub repo where chat messages will live (e.g. you/my-aim-data)."
  ADMIN_SECRET = "A secret passphrase you choose. Required to mint AIM tokens for new users. Keep this safe."
  WEBHOOK_SECRET = "(Optional, recommended) A secret string for verifying GitHub push webhooks. Leave blank to disable webhooks; messages sent via AIM still update in real-time."
  REALTIME_MODE = "(Optional) Set to 'pulse' (default, polling via Netlify Blobs) or 'sse' (Edge Functions SSE, when available)."
